  ctx.fillStyle='rgba(150,215,255,.52)'; ctx.beginPath(); ctx.roundRect(-cw/2+2,cy+ch*.52,cw-4,ch*.44,2); ctx.fill();
  ctx.fillStyle='#FFFCCC';
  ctx.fillRect(-w/2+3,-h/2+1,5,4); ctx.fillRect(w/2-8,-h/2+1,5,4);
  ctx.fillStyle='rgba(255,255,180,.35)';
  ctx.beginPath(); ctx.arc(-w/2+5.5,-h/2-1,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w/2-5.5,-h/2-1,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF1010';
  ctx.fillRect(-w/2+3,h/2-5,5,4); ctx.fillRect(w/2-8,h/2-5,5,4);
  ctx.fillStyle='rgba(0,0,0,.14)'; ctx.fillRect(-1,-h/2+4,2,h-8);

  // ── Immune shield ──
  if (playerImmune) {
    const pulse = Math.sin(T * 6) * 0.5 + 0.5;
    ctx.globalAlpha = 0.35 + pulse * 0.35;
    ctx.strokeStyle = `rgba(80,255,160,1)`;
    ctx.lineWidth = 2.5 + pulse * 2;
    ctx.beginPath(); ctx.ellipse(0, 0, w * 0.88, h * 0.68, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.12 + pulse * 0.1;
    ctx.fillStyle = '#50FFA0';
    ctx.beginPath(); ctx.ellipse(0, 0, w * 0.88, h * 0.68, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawVignette() {
  const vg=ctx.createRadialGradient(CW/2,CH/2,CW*.32,CW/2,CH/2,CW*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.48)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,CW,CH);
}

function drawMinimap() {
  const mw=mmC.width, mh=mmC.height;
  const scX=WW/mw, scY=WH/mh;
  const mcx=CX/scX, mcy=CY/scY;

  mmCtx.fillStyle='#304A18';
  mmCtx.fillRect(0,0,mw,mh);

  // Draw spoke roads
  mmCtx.strokeStyle='#4A4A4A';
  for (let i=0;i<N_SPOKES;i++) {
    const a=SPOKE_ANGLES[i], sLen=SPOKE_LENS[i];
    mmCtx.lineWidth=Math.max(2,SPOKE_W/scX);
    mmCtx.beginPath();
    mmCtx.moveTo(mcx, mcy);
    mmCtx.lineTo(mcx+sLen*Math.cos(a)/scX, mcy+sLen*Math.sin(a)/scY);
    mmCtx.stroke();
  }

  // Draw ring
  mmCtx.strokeStyle='#4A4A4A';
  mmCtx.lineWidth=Math.max(3,RING_W/scX);
  mmCtx.beginPath();
  mmCtx.arc(mcx, mcy, RING_R/scX, 0, Math.PI*2);
  mmCtx.stroke();

  // Draw zones
  ZONES.forEach(z=>{
    mmCtx.fillStyle=z.color;
    mmCtx.fillRect(z.x/scX, z.y/scY, Math.max(3,z.w/scX), Math.max(2,z.h/scY));
  });

  // Viewport
  const vx=Math.max(0,Math.min(mw-2,cam.x/scX));
  const vy=Math.max(0,Math.min(mh-2,cam.y/scY));
  const vw=Math.min(mw-vx,CW/scX), vh=Math.min(mh-vy,CH/scY);
  mmCtx.strokeStyle='rgba(255,255,255,.3)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(vx,vy,vw,vh);

  // Player car
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath();
  mmCtx.arc(Math.max(1,Math.min(mw-1,car.x/scX)), Math.max(1,Math.min(mh-1,car.y/scY)), 3.5, 0, Math.PI*2);
  mmCtx.fill();
}

/* ═══════════════════════════════════════════════════
   ░░  MAIN LOOP  ░░
   ═══════════════════════════════════════════════════ */
let lastTS = 0;
let gameStarted = false;

function loop(ts) {
  if (!gameStarted) return;
  // First frame after start: seed lastTS cleanly so dt = 0 on frame 1
  if (lastTS === 0) { lastTS = ts; requestAnimationFrame(loop); return; }
  const dt = Math.min((ts - lastTS) / 1000, .033);
  lastTS = ts;
  update(dt);
  ctx.clearRect(0,0,CW,CH);
  if (ZOOM !== 1.0) {
    ctx.save();
    ctx.translate(CW/2, CH/2);
    ctx.scale(ZOOM, ZOOM);
    ctx.translate(-CW/2, -CH/2);
  }
  drawGrass();
  drawRoads();
  drawTrack();
  drawTrafficLights();
  drawTrees();
  drawSafeZone();
  drawZones();
  drawAICars();
  drawBottles();
  drawTrain();
  drawSmoke();
  drawSparks();
  drawExplosions();
  drawCar();
  drawTornado();
  if (ZOOM !== 1.0) ctx.restore();
  drawTsunami();
  drawVignette();
  drawMinimap();
  requestAnimationFrame(loop);
}

function startGame(e) {
  if (gameStarted) return;
  e.preventDefault();
  e.stopPropagation();
  gameStarted = true;
  document.getElementById('start-screen').style.display = 'none';
  car.targetX = car.targetY = null;
  car.speed = 0;
  // Ignore all canvas input for 600ms so the start-tap can't bleed through
  inputLocked = true;
  setTimeout(() => { inputLocked = false; }, 600);
  lastTS = 0;
  requestAnimationFrame(loop);
}

// Use pointerdown for instant response (no 300ms iOS tap delay)
document.getElementById('start-screen').addEventListener('pointerdown', startGame, { once: true });
// Fallback for browsers without Pointer Events
document.getElementById('start-screen').addEventListener('click', startGame, { once: true });
</script>
